<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SYMX Route Fetch</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="app">
    <!-- ── Header ── -->
    <header class="header">
      <div class="header-left">
        <div class="logo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z" />
            <path d="M2 17l10 5 10-5" />
            <path d="M2 12l10 5 10-5" />
          </svg>
        </div>
        <div class="header-text">
          <h1>SYMX Route Fetch</h1>
          <span class="version">V.1.0.5</span>
        </div>
      </div>
      <div class="status-dot" id="statusDot" title="Checking..."></div>
    </header>

    <!-- ── Date Info (single row) ── -->
    <div class="section" id="pageInfoSection" style="display: none;">
      <div class="info-card" style="width:100%;">
        <div class="info-icon date-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
            <line x1="16" y1="2" x2="16" y2="6" />
            <line x1="8" y1="2" x2="8" y2="6" />
            <line x1="3" y1="10" x2="21" y2="10" />
          </svg>
        </div>
        <div>
          <span class="info-label">Date</span>
          <span class="info-value" id="dateValue">—</span>
        </div>
      </div>
    </div>

    <!-- ── Scraped Routes ── -->
    <div class="section" id="routesSection" style="display: none;">
      <div class="section-header">
        <h2>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />
            <polyline points="14 2 14 8 20 8" />
          </svg>
          Captured Routes
        </h2>
        <span class="badge" id="routeCountBadge">0</span>
      </div>

      <!-- Search bar -->
      <div class="search-bar" id="searchBar" style="display:none;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input type="text" id="searchInput" placeholder="Search route code or transporter..." autocomplete="off"
          spellcheck="false">
      </div>

      <!-- Route list preview -->
      <div class="route-list" id="routeList">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="16" y1="13" x2="8" y2="13" />
              <line x1="16" y1="17" x2="8" y2="17" />
              <line x1="10" y1="9" x2="8" y2="9" />
            </svg>
          </div>
          <p>No routes captured yet</p>
          <span>Navigate to the Amazon Logistics routes page and data will be captured automatically</span>
        </div>
      </div>
    </div>

    <!-- ── Actions ── -->
    <div class="section actions" id="actionsSection" style="display: none;">
      <button class="btn btn-secondary" id="scrapeBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10" />
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
        </svg>
        <span>Re-Fetch</span>
      </button>
      <button class="btn btn-primary" id="syncBtn" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z" />
          <path d="M2 17l10 5 10-5" />
          <path d="M2 12l10 5 10-5" />
        </svg>
        <span>Sync to SYMX</span>
      </button>
    </div>

    <!-- ── Sync Status ── -->
    <div class="section" id="syncStatusSection" style="display: none;">
      <div class="sync-status" id="syncStatus">
        <div class="sync-spinner"></div>
        <span>Syncing routes to SYMX Systems...</span>
      </div>
    </div>

    <!-- ── Sync Result ── -->
    <div class="section" id="syncResultSection" style="display: none;">
      <div class="sync-result" id="syncResult"></div>
    </div>

    <!-- ── Footer ── -->
    <footer class="footer">
      <span>SYMX Systems</span>
      <span class="footer-dot">·</span>
      <span id="lastSyncTime">Never synced</span>
    </footer>
  </div>

  <!-- ══════════════════════════════════════════════════════════
       DETAIL OVERLAY — shows when clicking a route row
       ══════════════════════════════════════════════════════════ -->
  <div class="detail-overlay" id="detailOverlay">
    <div class="detail-panel">
      <!-- Detail Header -->
      <div class="detail-header">
        <button class="detail-back" id="detailBack" title="Back">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6" />
          </svg>
        </button>
        <div class="detail-title">
          <span class="detail-route-code" id="detailRouteCode">—</span>
          <span class="detail-driver" id="detailDriver">—</span>
        </div>
        <span class="detail-status-badge" id="detailStatusBadge"></span>
      </div>

      <!-- Detail Tabs -->
      <div class="detail-tabs">
        <button class="detail-tab active" data-tab="summary">Summary</button>
        <button class="detail-tab" data-tab="transporters">Transporters</button>
        <button class="detail-tab" data-tab="raw">Raw JSON</button>
      </div>

      <!-- Tab Content -->
      <div class="detail-body" id="detailBody">
        <!-- Summary Tab -->
        <div class="detail-tab-content active" id="tab-summary"></div>
        <!-- Transporters Tab -->
        <div class="detail-tab-content" id="tab-transporters"></div>
        <!-- Raw JSON Tab -->
        <div class="detail-tab-content" id="tab-raw"></div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
