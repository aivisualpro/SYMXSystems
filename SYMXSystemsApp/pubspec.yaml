name: symx_systems_app
description: "SYMX Systems mobile & web application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # Routing (deep links + web URLs)
  go_router: ^14.0.0

  # HTTP client
  dio: ^5.4.0

  # State management
  flutter_riverpod: ^2.5.1

  # Local persistence
  shared_preferences: ^2.2.2

  # Secure token storage
  flutter_secure_storage: ^9.0.0

  # Typography
  google_fonts: ^6.2.1

  # High-quality animations
  lottie: ^3.1.0

  # Cool one-line animations
  flutter_animate: ^4.5.0

  # Loading shimmers
  shimmer: ^3.0.0

  # Date formatting
  intl: ^0.19.0

  # Cached images
  cached_network_image: ^3.3.1

  # PIN input UI
  pin_code_fields: ^8.0.1

  # Material design icons (bundled with Flutter)
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
