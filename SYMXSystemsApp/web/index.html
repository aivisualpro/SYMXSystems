<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="SYMX Systems — Driver operations app for inspections, routes, and notices.">

  <!-- Match the dark navy used by the root SYMX marketing app -->
  <meta name="theme-color" content="#0A0E1A">

  <!-- iOS PWA meta -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SYMX Systems">

  <!-- Favicons -->
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="manifest" href="manifest.json">

  <title>SYMX Systems</title>

  <style>
    body {
      margin: 0;
      background-color: #0A0E1A;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    #app-loader {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #0A0E1A;
      transition: opacity 320ms ease;
      z-index: 9999;
    }
    #app-loader img {
      width: 88px; height: 88px;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1);    opacity: 1;   }
      50%      { transform: scale(0.92); opacity: 0.55;}
    }
  </style>
</head>
<body>
  <div id="app-loader"><img src="favicon.png" alt="SYMX"></div>
  <script>
    // Hide the loader once Flutter's first frame paints.
    window.addEventListener('flutter-first-frame', () => {
      const el = document.getElementById('app-loader');
      if (!el) return;
      el.style.opacity = '0';
      setTimeout(() => el.remove(), 340);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
