<!DOCTYPE html>
<html>
<head>
<style>
  .flex { display: flex; }
  .sticky { position: sticky; left: 0; z-index: 20; background: red; width: 100px; height: 50px; }
  .relative { position: relative; background: blue; width: 50px; height: 50px; left: -20px; }
</style>
</head>
<body>
  <div class="flex">
    <div class="sticky">Sticky</div>
    <div class="relative">Rel</div>
  </div>
</body>
</html>
